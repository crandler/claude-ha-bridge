mode: parallel
max: 10

trigger:
  - platform: webhook
    webhook_id: !input webhook_id
    allowed_methods:
      - POST
    # Keep the webhook reachable only from within your HA network. The
    # Mac daemon hits HA directly and does not need the public internet
    # for the hook POST. Setting this to false opens the webhook to any
    # caller that knows the id -- only do that if you route through HA
    # Nabu Casa without a trusted LAN.
    local_only: true

variables:
  push_sound: !input notification_sound
  notify_device_id: !input notify_device
  notify_service: >-
    notify.mobile_app_{{ device_attr(notify_device_id, 'name') | slugify }}
  # Stable per-Claude-session id, used only for iOS push grouping so a
  # new prompt replaces the previous notification for the same session.
  notification_tag: "{{ trigger.json.tag | default('claude', true) }}"
  # One-shot token generated by notify.sh for this specific push. Encoded
  # into each action button so the daemon can verify the event is tied
  # to the session that registered it -- replayed or forged button
  # events carry an unknown token and get dropped.
  notification_token: "{{ trigger.json.token | default('', true) }}"
  # Notification type from the Claude Code hook: `permission_prompt` for
  # tool-permission requests (full action button set), anything else for
  # generic "Claude needs help" pushes (only Stop button).
  notif_type: "{{ trigger.json.notification_type | default('', true) }}"
  mode_entity_id: !input mode_entity
  presence_entity_id: !input presence_entity
  notify_mode: >-
    {{ states(mode_entity_id) if mode_entity_id else 'on' }}
  presence_state: >-
    {{ states(presence_entity_id) if presence_entity_id else 'not_home' }}

action:
  - alias: "Respect mode helper and presence"
    condition: template
    value_template: >-
      {{ notify_mode != 'off'
         and not (notify_mode == 'auto' and presence_state == 'home') }}
  - choose:
      - alias: "Permission prompt -- full Approve/Always/Deny/Stop button set"
        conditions:
          - condition: template
            value_template: "{{ notif_type == 'permission_prompt' }}"
        sequence:
          - action: "{{ notify_service }}"
            data:
              title: "{{ trigger.json.title | default('Claude', true) }}"
              message: "{{ trigger.json.message | default('', true) }}"
              data:
                tag: "{{ notification_tag }}"
                group: claude-ha-bridge
                url: !input tap_url
                push:
                  sound: "{{ push_sound if push_sound else 'default' }}"
                  interruption-level: time-sensitive
                actions:
                  - action: "approve_{{ notification_token }}"
                    title: !input approve_label
                    authenticationRequired: false
                  - action: "allowalways_{{ notification_token }}"
                    title: !input allow_always_label
                    authenticationRequired: false
                  - action: "deny_{{ notification_token }}"
                    title: !input deny_label
                    authenticationRequired: false
                  - action: "stop_{{ notification_token }}"
                    title: !input stop_label
                    destructive: true
                    authenticationRequired: false
    default:
      - alias: "Anything else (idle/inline/etc.) -- generic help-needed push, Stop only"
        action: "{{ notify_service }}"
        data:
          title: "{{ trigger.json.title | default('Claude', true) }}"
          message: !input help_message
          data:
            tag: "{{ notification_tag }}"
            group: claude-ha-bridge
            url: !input tap_url
            push:
              sound: "{{ push_sound if push_sound else 'default' }}"
              interruption-level: time-sensitive
            actions:
              - action: "stop_{{ notification_token }}"
                title: !input stop_label
                destructive: true
                authenticationRequired: false
