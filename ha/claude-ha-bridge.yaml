blueprint:
  name: Claude HA Bridge - Actionable Notifications
  description: >
    Receives webhooks from the Claude HA Bridge daemon on a Mac and pushes
    actionable notifications to a mobile device. Button taps become
    `mobile_app_notification_action` events, which the Mac daemon routes
    back into the matching Claude tmux session via `tmux send-keys`.
  domain: automation
  input:
    notify_device:
      name: Mobile device
      description: >
        Pick the mobile_app device to notify. The notify service is derived
        automatically as `notify.mobile_app_<device_name_slug>`.
      selector:
        device:
          filter:
            - integration: mobile_app
          multiple: false
    webhook_id:
      name: Webhook ID
      description: >
        Must match `webhook_id` in ~/.config/claude-ha-bridge/config.json on
        the Mac. The install wizard generates one if you don't have it yet.
      selector:
        text:
    approve_label:
      name: Approve button label
      default: Erlauben
      selector:
        text:
    deny_label:
      name: Deny button label
      default: Ablehnen
      selector:
        text:
    stop_label:
      name: Stop button label
      default: Stoppen
      selector:
        text:
    notification_sound:
      name: iOS notification sound (optional)
      description: >
        Pick a preset or type a custom sound filename (e.g.
        `US-EN-Morgan-Freeman-Helpful.wav`). Custom sounds must be placed
        in the iOS Companion App's notification sounds folder.
      default: "default"
      selector:
        select:
          custom_value: true
          options:
            - label: "Default"
              value: "default"
            - label: "None (silent)"
              value: "none"

mode: parallel
max: 10

trigger:
  - platform: webhook
    webhook_id: !input webhook_id
    allowed_methods:
      - POST
    local_only: false

variables:
  push_sound: !input notification_sound
  notify_device_id: !input notify_device
  notify_service: >-
    notify.mobile_app_{{ device_attr(notify_device_id, 'name') | slugify }}

action:
  - action: "{{ notify_service }}"
    data:
      title: "{{ trigger.json.title | default('Claude', true) }}"
      message: "{{ trigger.json.message | default('', true) }}"
      data:
        tag: "{{ trigger.json.tag | default('claude', true) }}"
        group: claude-ha-bridge
        push:
          sound: "{{ push_sound if push_sound else 'default' }}"
          interruption-level: time-sensitive
        actions:
          - action: approve
            title: !input approve_label
            authenticationRequired: false
          - action: deny
            title: !input deny_label
            authenticationRequired: false
          - action: stop
            title: !input stop_label
            destructive: true
            authenticationRequired: false
