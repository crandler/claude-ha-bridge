blueprint:
  name: Claude HA Bridge - Actionable Notifications
  description: >
    Blueprint version: 2.4.0.
    Receives webhooks from the Claude HA Bridge daemon on a Mac and pushes
    actionable notifications to a mobile device. Button taps become
    `mobile_app_notification_action` events, which the Mac daemon routes
    back into the matching Claude tmux session via `tmux send-keys`.
  domain: automation
  input:
    notify_device:
      name: Mobile device
      description: >
        Pick the mobile_app device to notify. The notify service is derived
        automatically as `notify.mobile_app_<device_name_slug>`.
      selector:
        device:
          filter:
            - integration: mobile_app
          multiple: false
    webhook_id:
      name: Webhook ID
      description: >
        Must match `webhook_id` in ~/.config/claude-ha-bridge/config.json on
        the Mac. The install wizard generates one if you don't have it yet.
      selector:
        text:
    mode_entity:
      name: Mode helper (optional)
      description: >
        Create an `input_select` helper in HA with the three options
        `off`, `on`, `auto`, then pick it here. Expose that helper on
        your dashboard to toggle notifications. Leave empty to always
        notify.
      default: ""
      selector:
        entity:
          filter:
            - domain: input_select
          multiple: false
    presence_entity:
      name: Presence entity (optional)
      description: >
        Required when the mode helper is set to `auto`. Any entity whose
        state becomes `home` when you are home works (person,
        device_tracker, binary_sensor, input_boolean). In `auto` mode,
        notifications fire only while this entity is not `home`.
      default: ""
      selector:
        entity:
          filter:
            - domain:
                - person
                - device_tracker
                - binary_sensor
                - input_boolean
          multiple: false
    approve_label:
      name: Approve button label
      default: Approve
      selector:
        text:
    allow_always_label:
      name: Allow-always button label
      description: >
        Sent as Claude's "Yes, and don't ask again" option when present.
        At 2-option prompts the daemon falls back to a plain Yes.
      default: Always approve
      selector:
        text:
    deny_label:
      name: Deny button label
      default: Deny
      selector:
        text:
    stop_label:
      name: Stop button label
      default: Stop
      selector:
        text:
    tap_url:
      name: Tap URL (optional)
      description: >
        URL opened when the user taps the notification (instead of
        long-pressing for the action buttons). Default is the Claude
        iOS app's custom URL scheme (`claude://`), which opens the
        native app directly instead of an in-app WebView. iOS will
        prompt once per app pair to confirm cross-app launching --
        choose "Always Allow" if offered. Alternative:
        `https://claude.ai/code` (Universal Link, no prompt but lands
        in a WebView). Leave empty to keep the iOS Companion App
        default (open HA).
      default: "claude://"
      selector:
        text:
    help_message:
      name: Help-needed message body
      description: >
        Body shown for non-permission notifications (idle prompt,
        inline question, anything where Claude is just waiting on
        you). Permission-prompt pushes keep their original tool-call
        body so you can see what Claude wants to do.
      default: "Claude needs your input"
      selector:
        text:
    notification_sound:
      name: iOS notification sound (optional)
      description: >
        Pick a preset or type a custom sound filename (e.g.
        `US-EN-Morgan-Freeman-Helpful.wav`). Custom sounds must be placed
        in the iOS Companion App's notification sounds folder.
      default: "default"
      selector:
        select:
          custom_value: true
          options:
            - label: "Default"
              value: "default"
            - label: "None (silent)"
              value: "none"
            - label: "Alexa: Back Door Opened"
              value: "US-EN-Alexa-Back-Door-Opened.wav"
            - label: "Alexa: Back Door Unlocked"
              value: "US-EN-Alexa-Back-Door-Unlocked.wav"
